<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1.0" />
  <title>AI Debate Arena</title>
  <meta name="description" content="Two AI minds. Opposite worldviews. Real voices. Enter a topic and watch them clash — or grab the mic and join the fight." />

  <!-- PWA / installable app -->
  <link rel="manifest" href="manifest.webmanifest" />
  <meta name="theme-color" content="#080C14" />
  <!-- iOS home-screen app -->
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Debate Arena" />
  <link rel="apple-touch-icon" href="icon-180.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700;900&family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <canvas id="bg-canvas" aria-hidden="true"></canvas>

  <!-- ======= First-visit welcome / sign-in splash ======= -->
  <div id="splash-screen" class="splash-screen" role="dialog" aria-modal="true" aria-label="Welcome">
    <button id="splash-close" class="splash-close" type="button" aria-label="Close">
      <svg viewBox="0 0 24 24" width="16" height="16" fill="currentColor" aria-hidden="true">
        <path d="M18.3 5.71 12 12l6.3 6.29-1.41 1.42L10.59 13.4 4.3 19.71 2.88 18.3 9.17 12 2.88 5.71 4.3 4.29l6.29 6.3 6.3-6.3z"/>
      </svg>
    </button>

    <div class="splash-center">
      <h1 class="splash-title"><span id="splash-typed"></span><span class="splash-cursor" aria-hidden="true"></span></h1>
    </div>

    <div class="splash-sheet">
      <button id="splash-google-btn" class="pill-btn google-btn splash-google-btn" type="button">
        <svg viewBox="0 0 18 18" width="18" height="18" aria-hidden="true">
          <path fill="#4285F4" d="M17.64 9.2c0-.64-.06-1.25-.16-1.84H9v3.48h4.84a4.14 4.14 0 0 1-1.8 2.71v2.26h2.9c1.7-1.57 2.7-3.87 2.7-6.61z"/>
          <path fill="#34A853" d="M9 18c2.43 0 4.47-.81 5.96-2.19l-2.9-2.26c-.81.54-1.84.86-3.06.86-2.35 0-4.34-1.59-5.05-3.72H.95v2.33A9 9 0 0 0 9 18z"/>
          <path fill="#FBBC05" d="M3.95 10.69A5.41 5.41 0 0 1 3.67 9c0-.59.1-1.16.28-1.69V4.98H.95A9 9 0 0 0 0 9c0 1.45.35 2.83.95 4.02l3-2.33z"/>
          <path fill="#EA4335" d="M9 3.58c1.32 0 2.51.46 3.44 1.35l2.58-2.58C13.46.89 11.43 0 9 0A9 9 0 0 0 .95 4.98l3 2.33C4.66 5.17 6.65 3.58 9 3.58z"/>
        </svg>
        <span>Continue with Google</span>
      </button>
      <button id="splash-skip-btn" class="splash-skip" type="button">Continue without an account</button>
    </div>
  </div>

  <div id="arena" class="arena">
    <!-- ======= Header ======= -->
    <header class="arena-header">
      <div class="header-bar">
        <div class="header-left">
          <button id="options-btn" class="icon-btn" type="button" aria-label="Options" title="Options">
            <svg viewBox="0 0 24 24" width="18" height="18" fill="currentColor" aria-hidden="true">
              <path d="M19.14 12.94a7.07 7.07 0 0 0 0-1.88l2.03-1.58a.5.5 0 0 0 .12-.64l-1.92-3.32a.5.5 0 0 0-.6-.22l-2.39.96a7.03 7.03 0 0 0-1.62-.94l-.36-2.54a.5.5 0 0 0-.5-.42h-3.84a.5.5 0 0 0-.5.42l-.36 2.54c-.58.24-1.12.55-1.62.94l-2.39-.96a.5.5 0 0 0-.6.22L2.71 8.84a.5.5 0 0 0 .12.64l2.03 1.58a7.07 7.07 0 0 0 0 1.88l-2.03 1.58a.5.5 0 0 0-.12.64l1.92 3.32c.13.22.39.31.6.22l2.39-.96c.5.39 1.04.7 1.62.94l.36 2.54c.04.24.25.42.5.42h3.84c.25 0 .46-.18.5-.42l.36-2.54c.58-.24 1.12-.55 1.62-.94l2.39.96c.21.09.47 0 .6-.22l1.92-3.32a.5.5 0 0 0-.12-.64l-2.03-1.58zM12 15.5A3.5 3.5 0 1 1 12 8.5a3.5 3.5 0 0 1 0 7z"/>
            </svg>
          </button>
          <!-- Visible only when signed out — brings back the splash's sign-in sheet. -->
          <button id="header-login-btn" class="header-login-btn" type="button" hidden>
            <svg viewBox="0 0 18 18" width="14" height="14" aria-hidden="true">
              <path fill="#4285F4" d="M17.64 9.2c0-.64-.06-1.25-.16-1.84H9v3.48h4.84a4.14 4.14 0 0 1-1.8 2.71v2.26h2.9c1.7-1.57 2.7-3.87 2.7-6.61z"/>
              <path fill="#34A853" d="M9 18c2.43 0 4.47-.81 5.96-2.19l-2.9-2.26c-.81.54-1.84.86-3.06.86-2.35 0-4.34-1.59-5.05-3.72H.95v2.33A9 9 0 0 0 9 18z"/>
              <path fill="#FBBC05" d="M3.95 10.69A5.41 5.41 0 0 1 3.67 9c0-.59.1-1.16.28-1.69V4.98H.95A9 9 0 0 0 0 9c0 1.45.35 2.83.95 4.02l3-2.33z"/>
              <path fill="#EA4335" d="M9 3.58c1.32 0 2.51.46 3.44 1.35l2.58-2.58C13.46.89 11.43 0 9 0A9 9 0 0 0 .95 4.98l3 2.33C4.66 5.17 6.65 3.58 9 3.58z"/>
            </svg>
            <span id="header-login-label">Log in</span>
          </button>
        </div>
        <div class="lang-switch" id="lang-switch" role="group" aria-label="Language">
          <button type="button" data-lang="en" class="active">EN</button>
          <button type="button" data-lang="de">DE</button>
        </div>
      </div>
      <h1 class="title">AI <span class="title-vs">DEBATE</span> ARENA</h1>
      <p class="subtitle">Two minds. Opposite worldviews. One arena.</p>

      <form id="topic-form" class="topic-bar" autocomplete="off">
        <input
          id="topic-input"
          type="text"
          maxlength="200"
          placeholder="Enter any topic… e.g. “AI will make humanity better”"
          aria-label="Debate topic"
        />
        <button id="start-btn" type="submit">
          <span class="btn-label">Ignite debate</span>
        </button>
      </form>
    </header>

    <!-- ======= Agents ======= -->
    <section class="stage" aria-live="off">
      <div class="agent agent-aria" id="agent-ARIA">
        <div class="core-wrap">
          <div class="sonar-rings" aria-hidden="true"><span></span><span></span><span></span></div>
          <svg class="core" viewBox="0 0 220 220" aria-hidden="true">
            <circle class="ring ring-ticks" cx="110" cy="110" r="102" />
            <circle class="ring ring-dash" cx="110" cy="110" r="88" />
            <polygon class="hex" points="110,44 167.2,77 167.2,143 110,176 52.8,143 52.8,77" />
            <polygon class="hex hex-inner" points="110,60 151.6,84 151.6,132 110,156 68.4,132 68.4,84" />
            <line class="tick" x1="110" y1="14" x2="110" y2="26" />
            <line class="tick" x1="110" y1="194" x2="110" y2="206" />
            <line class="tick" x1="14" y1="110" x2="26" y2="110" />
            <line class="tick" x1="194" y1="110" x2="206" y2="110" />
            <circle class="core-glow" cx="110" cy="110" r="46" />
            <circle class="core-dot" cx="110" cy="110" r="30" />
          </svg>
          <div class="eq" aria-hidden="true"><span></span><span></span><span></span><span></span><span></span></div>
        </div>
        <h2 class="agent-name">ARIA</h2>
        <p class="agent-tag">progressive · optimist</p>
        <p class="agent-status" data-status>standby</p>
      </div>

      <div class="stage-divider" aria-hidden="true">
        <span class="vs-line"></span>
        <span class="vs">VS</span>
        <span class="vs-line"></span>
      </div>

      <div class="agent agent-rex" id="agent-REX">
        <div class="core-wrap">
          <div class="sonar-rings" aria-hidden="true"><span></span><span></span><span></span></div>
          <svg class="core" viewBox="0 0 220 220" aria-hidden="true">
            <circle class="ring ring-ticks" cx="110" cy="110" r="102" />
            <circle class="ring ring-dash" cx="110" cy="110" r="88" />
            <polygon class="hex" points="110,44 167.2,77 167.2,143 110,176 52.8,143 52.8,77" />
            <polygon class="hex hex-inner" points="110,60 151.6,84 151.6,132 110,156 68.4,132 68.4,84" />
            <line class="tick" x1="110" y1="14" x2="110" y2="26" />
            <line class="tick" x1="110" y1="194" x2="110" y2="206" />
            <line class="tick" x1="14" y1="110" x2="26" y2="110" />
            <line class="tick" x1="194" y1="110" x2="206" y2="110" />
            <circle class="core-glow" cx="110" cy="110" r="46" />
            <circle class="core-dot" cx="110" cy="110" r="30" />
          </svg>
          <div class="eq" aria-hidden="true"><span></span><span></span><span></span><span></span><span></span></div>
        </div>
        <h2 class="agent-name">REX</h2>
        <p class="agent-tag">skeptic · realist</p>
        <p class="agent-status" data-status>standby</p>
      </div>
    </section>

    <!-- ======= Transcript ======= -->
    <section class="transcript-wrap">
      <div class="transcript-label"><span></span> <em id="transcript-label-text">live transcript</em> <span></span></div>
      <div id="transcript" class="transcript" role="log" aria-live="polite"></div>
    </section>

    <!-- ======= Mic ======= -->
    <footer class="mic-dock">
      <div class="dock-row">
        <button id="mic-btn" class="mic-btn" type="button" aria-pressed="false" title="Join the debate with your voice">
          <svg viewBox="0 0 24 24" width="26" height="26" fill="currentColor" aria-hidden="true">
            <path d="M12 14a3 3 0 0 0 3-3V6a3 3 0 1 0-6 0v5a3 3 0 0 0 3 3zm5-3a5 5 0 0 1-10 0H5a7 7 0 0 0 6 6.92V21h2v-3.08A7 7 0 0 0 19 11h-2z"/>
          </svg>
          <span class="mic-label">Join the debate</span>
        </button>
        <button id="stop-btn" class="stop-btn" type="button" hidden title="Stop the debate">
          <svg viewBox="0 0 24 24" width="20" height="20" fill="currentColor" aria-hidden="true">
            <rect x="6" y="6" width="12" height="12" rx="2"/>
          </svg>
          <span class="stop-label">Stop</span>
        </button>
        <button id="new-btn" class="new-btn" type="button" hidden title="Start a new debate">
          <svg viewBox="0 0 24 24" width="18" height="18" fill="currentColor" aria-hidden="true">
            <path d="M17.65 6.35A7.96 7.96 0 0 0 12 4a8 8 0 1 0 7.73 10h-2.08A6 6 0 1 1 12 6c1.66 0 3.14.69 4.22 1.78L13 11h7V4l-2.35 2.35z"/>
          </svg>
          <span class="new-label">New debate</span>
        </button>
      </div>
      <p id="mic-hint" class="mic-hint">tap the mic and speak — both agents will react</p>
    </footer>
  </div>

  <!-- ======= Options drawer ======= -->
  <div id="options-overlay" class="overlay" hidden></div>
  <aside id="options-panel" class="options-panel" hidden aria-label="Options">
    <div class="panel-head">
      <h2 id="options-title">Options</h2>
      <button id="options-close" class="icon-btn" type="button" aria-label="Close">
        <svg viewBox="0 0 24 24" width="18" height="18" fill="currentColor" aria-hidden="true">
          <path d="M18.3 5.71 12 12l6.3 6.29-1.41 1.42L10.59 13.4 4.3 19.71 2.88 18.3 9.17 12 2.88 5.71 4.3 4.29l6.29 6.3 6.3-6.3z"/>
        </svg>
      </button>
    </div>

    <!-- Signed-out: pitch explaining what an account unlocks -->
    <section class="panel-section signin-card" id="signin-card">
      <h3 id="signin-title">Sign in</h3>
      <p id="signin-pitch" class="signin-pitch"></p>
      <ul class="benefits">
        <li id="benefit-1"></li>
        <li id="benefit-2"></li>
        <li id="benefit-3"></li>
        <li id="benefit-4"></li>
      </ul>
      <button id="signin-btn" class="pill-btn google-btn" type="button">
        <svg viewBox="0 0 18 18" width="16" height="16" aria-hidden="true">
          <path fill="#4285F4" d="M17.64 9.2c0-.64-.06-1.25-.16-1.84H9v3.48h4.84a4.14 4.14 0 0 1-1.8 2.71v2.26h2.9c1.7-1.57 2.7-3.87 2.7-6.61z"/>
          <path fill="#34A853" d="M9 18c2.43 0 4.47-.81 5.96-2.19l-2.9-2.26c-.81.54-1.84.86-3.06.86-2.35 0-4.34-1.59-5.05-3.72H.95v2.33A9 9 0 0 0 9 18z"/>
          <path fill="#FBBC05" d="M3.95 10.69A5.41 5.41 0 0 1 3.67 9c0-.59.1-1.16.28-1.69V4.98H.95A9 9 0 0 0 0 9c0 1.45.35 2.83.95 4.02l3-2.33z"/>
          <path fill="#EA4335" d="M9 3.58c1.32 0 2.51.46 3.44 1.35l2.58-2.58C13.46.89 11.43 0 9 0A9 9 0 0 0 .95 4.98l3 2.33C4.66 5.17 6.65 3.58 9 3.58z"/>
        </svg>
        <span id="signin-btn-label">Sign in with Google</span>
      </button>
    </section>

    <!-- Signed-in: account summary + sign out -->
    <section class="panel-section account-card" id="account-card" hidden>
      <div class="account-row">
        <img id="account-avatar" class="account-avatar" alt="" />
        <div class="account-meta">
          <span id="account-name" class="account-name"></span>
          <span id="account-email" class="account-email"></span>
        </div>
      </div>
      <button id="signout-btn" class="text-btn" type="button">Sign out</button>
    </section>

    <!-- Only shown once signed in — there's nothing to save a name against otherwise. -->
    <section class="panel-section" id="profile-card" hidden>
      <h3 id="profile-title">Profile</h3>
      <label class="field-label" id="label-name" for="profile-name">Name</label>
      <input id="profile-name" class="field" type="text" autocomplete="name" maxlength="60" />
      <button id="profile-save" class="pill-btn" type="button">Save</button>
    </section>

    <!-- Only shown once signed in — a guest shouldn't see a personal history
         they never created an account for. -->
    <section class="panel-section" id="history-card" hidden>
      <div class="section-head">
        <h3 id="history-title">Debate library</h3>
        <button id="history-clear" class="text-btn" type="button">Clear all</button>
      </div>
      <div id="history-list" class="history-list"></div>
    </section>
  </aside>

  <div id="toast" class="toast" role="status"></div>

  <!-- ======= "Download the summary?" prompt, shown when a debate ends ======= -->
  <div id="pdf-offer" class="pdf-offer" hidden role="status">
    <span id="pdf-offer-text">Want a PDF summary of this debate?</span>
    <div class="pdf-offer-actions">
      <button id="pdf-offer-download" class="pill-btn" type="button">
        <span id="pdf-offer-download-label">Download PDF</span>
      </button>
      <button id="pdf-offer-dismiss" class="icon-btn" type="button" aria-label="Dismiss">
        <svg viewBox="0 0 24 24" width="14" height="14" fill="currentColor" aria-hidden="true">
          <path d="M18.3 5.71 12 12l6.3 6.29-1.41 1.42L10.59 13.4 4.3 19.71 2.88 18.3 9.17 12 2.88 5.71 4.3 4.29l6.29 6.3 6.3-6.3z"/>
        </svg>
      </button>
    </div>
  </div>

  <script>
    window.BACKEND_URL = "https://ai-debate-arena-53zm.onrender.com";
    // Public by design: this is the anon/publishable key, meant to ship in
    // client code. Real access control lives in Supabase's row-level
    // security policies on the `debates` table, not in keeping this secret.
    window.SUPABASE_URL = "https://jzlhgdhygptvggklwjms.supabase.co";
    window.SUPABASE_ANON_KEY = "sb_publishable_WnbJLKDf0Op1tjGYM4IUwg_c-OZO8CY";
  </script>
  <script src="https://cdn.socket.io/4.8.1/socket.io.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/0.160.0/three.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <script src="animations.js"></script>
  <script src="app.js"></script>
</body>
</html>
